name: Deploy Website

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Show Branch
        shell: powershell
        run: |
          git branch --show-current
          git log --oneline -1

      - name: Build Frontend
        shell: powershell
        run: |
          cd Frontend
          npm install --legacy-peer-deps
          npm run build

      - name: Restart Backend
        shell: powershell
        run: |
          pm2 restart backend
