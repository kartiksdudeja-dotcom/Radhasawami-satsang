name: Deploy Website

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend
        shell: powershell
        run: |
          cd Frontend
          npm install
          npm run build

      - name: Restart Backend
        shell: powershell
        run: |
          pm2 restart backend
